name: Deploy to EC2

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: junseo2323/korcan-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
             NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
             NEXT_PUBLIC_VAPID_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Navigate to app directory
            cd ~/korcan

            # Ensure db directory exists and has permissions
            mkdir -p db_data
            sudo chmod -R 777 db_data

            # Pull the latest image
            sudo docker compose -f docker-compose.prod.yml pull

            # Ensure NEXTAUTH_URL is correct
            sed -i 's|NEXTAUTH_URL=.*|NEXTAUTH_URL="https://korcan.cc"|g' .env

            # Restart containers
            sudo docker compose -f docker-compose.prod.yml up -d

            # ---------------------------------------------------
            # [수정됨] 안정적인 마이그레이션 실행
            # ---------------------------------------------------
            echo "Waiting for server to start..."
            sleep 15  # <--- 서버가 켜질 때까지 15초 대기 (매우 중요)

            echo "Running Database Migration (db push)..."
            # deploy 대신 db push 사용 (스키마 강제 동기화) + 명시적 DB URL 및 데이터 손실 허용
            sudo docker compose -f docker-compose.prod.yml exec -T -e DATABASE_URL="file:/app/db/prod.db" app npx prisma db push --accept-data-loss

            # Prune unused images
            sudo docker image prune -f